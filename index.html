              {id:"648",t:"Replace Words",n:648,d:"M"},
              {id:"720",t:"Longest Word in Dictionary",n:720,d:"M"},
              {id:"211",t:"Design Add and Search Words Data Structure",n:211,d:"M"},
            ]},
            { id:"tri-bit", label:"Bitwise Trie", probs:[
              {id:"421",t:"Maximum XOR of Two Numbers in an Array",n:421,d:"M"},
            ]},
          ]},
          { id:"dp", label:"Dynamic Programming", color:"#0D6E5C", sub:[
            { id:"dp-1d", label:"1D DP", probs:[
              {id:"70",t:"Climbing Stairs",n:70,d:"E"},
              {id:"198",t:"House Robber",n:198,d:"M"},
              {id:"91",t:"Decode Ways",n:91,d:"M"},
              {id:"dp322",t:"Coin Change",n:322,d:"M"},
            ]},
            { id:"dp-2d", label:"2D DP", probs:[
              {id:"62",t:"Unique Paths",n:62,d:"M"},
              {id:"1143",t:"Longest Common Subsequence",n:1143,d:"M"},
              {id:"72",t:"Edit Distance",n:72,d:"M"},
            ]},
            { id:"dp-knap", label:"Knapsack Pattern", probs:[
              {id:"416",t:"Partition Equal Subset Sum",n:416,d:"M"},
              {id:"494",t:"Target Sum",n:494,d:"M"},
              {id:"518",t:"Coin Change II",n:518,d:"M"},
              {id:"474",t:"Ones and Zeroes",n:474,d:"M"},
            ]},
            { id:"dp-seq", label:"Sequence DP", probs:[
              {id:"300",t:"Longest Increasing Subsequence",n:300,d:"M"},
              {id:"354",t:"Russian Doll Envelopes",n:354,d:"H"},
              {id:"673",t:"Number of Longest Increasing Subsequences",n:673,d:"M"},
            ]},
            { id:"dp-partition", label:"Partition DP", probs:[
              {id:"139",t:"Word Break",n:139,d:"M"},
              {id:"140",t:"Word Break II",n:140,d:"H"},
            ]},
            { id:"dp-interval", label:"Interval DP", probs:[
              {id:"312",t:"Burst Balloons",n:312,d:"H"},
              {id:"1039",t:"Minimum Score Triangulation of Polygon",n:1039,d:"M"},
            ]},
            { id:"dp-bitmask", label:"Bitmask DP", probs:[
              {id:"847",t:"Shortest Path Visiting All Nodes",n:847,d:"H"},
              {id:"1986",t:"Minimum Number of Work Sessions to Finish the Tasks",n:1986,d:"M"},
            ]},
            { id:"dp-digit", label:"Digit DP", probs:[
              {id:"357",t:"Count Numbers with Unique Digits",n:357,d:"M"},
              {id:"600",t:"Non-negative Integers without Consecutive Ones",n:600,d:"H"},
            ]},
            { id:"dp-tree", label:"DP on Trees", probs:[
              {id:"337",t:"House Robber III",n:337,d:"M"},
              {id:"968",t:"Binary Tree Cameras",n:968,d:"H"},
            ]},
          ]},
          { id:"greedy", label:"Greedy", color:"#8C5E0A", sub:[
            { id:"grdy-activity", label:"Interval Greedy – Activity Selection", probs:[
              {id:"435",t:"Non-overlapping Intervals",n:435,d:"M"},
              {id:"56",t:"Merge Intervals",n:56,d:"M"},
              {id:"57",t:"Insert Interval",n:57,d:"M"},
            ]},
            { id:"grdy-sched", label:"Scheduling Greedy", probs:[
              {id:"grdy621",t:"Task Scheduler",n:621,d:"M"},
              {id:"1235",t:"Maximum Profit in Job Scheduling",n:1235,d:"H"},
            ]},
            { id:"grdy-res", label:"Resource Allocation – Minimum Platforms / Rooms", probs:[
              {id:"grdy253",t:"Meeting Rooms II",n:253,d:"M"},
              {id:"1094",t:"Car Pooling",n:1094,d:"M"},
            ]},
            { id:"grdy-jump", label:"Jump Game Pattern", probs:[
              {id:"55",t:"Jump Game",n:55,d:"M"},
              {id:"45",t:"Jump Game II",n:45,d:"M"},
            ]},
            { id:"grdy-huff", label:"Huffman / Merge Cost", probs:[
              {id:"grdy1167",t:"Minimum Cost to Connect Sticks",n:1167,d:"M"},
            ]},
          ]},
          { id:"bitmanip", label:"Bit Manipulation", color:"#2C4F7A", sub:[
            { id:"bm-xor", label:"XOR Pattern", probs:[
              {id:"bm136",t:"Single Number",n:136,d:"E"},
              {id:"137",t:"Single Number II",n:137,d:"M"},
              {id:"389",t:"Find the Difference",n:389,d:"E"},
              {id:"268",t:"Missing Number",n:268,d:"E"},
            ]},
            { id:"bm-mask", label:"Bit Masking", probs:[
              {id:"231",t:"Power of Two",n:231,d:"E"},
              {id:"338",t:"Counting Bits",n:338,d:"E"},
              {id:"190",t:"Reverse Bits",n:190,d:"E"},
              {id:"191",t:"Number of 1 Bits (Hamming Weight)",n:191,d:"E"},
            ]},
            { id:"bm-subset", label:"Subset via Bits / Bit Checks / Prefix XOR", probs:[
              {id:"bm78",t:"Subsets (Bitmask approach)",n:78,d:"M"},
              {id:"1239",t:"Max Length of a Concatenated String with Unique Characters",n:1239,d:"M"},
              {id:"260",t:"Single Number III",n:260,d:"M"},
            ]},
          ]},
          { id:"sorting", label:"Sorting Algorithms", color:"#4A4A6A", sub:[
            { id:"sort-comp", label:"Comparison-based Sorts (Bubble / Selection / Insertion / Merge / Quick)", probs:[
              {id:"s912",t:"Sort an Array (Merge / Quick Sort)",n:912,d:"M"},
              {id:"s148",t:"Sort List (Merge Sort)",n:148,d:"M"},
              {id:"s215",t:"Kth Largest Element (Quick Select)",n:215,d:"M"},
            ]},
            { id:"sort-heap", label:"Heap Sort", probs:[
              {id:"sh215",t:"Kth Largest Element in an Array",n:215,d:"M"},
              {id:"shp347",t:"Top K Frequent Elements",n:347,d:"M"},
            ]},
            { id:"sort-linear", label:"Linear Sorts (Counting / Radix / Bucket)", probs:[
              {id:"s75",t:"Sort Colors (Counting Sort / Dutch Flag)",n:75,d:"M"},
              {id:"1122",t:"Relative Sort Array (Counting Sort)",n:1122,d:"E"},
              {id:"164",t:"Maximum Gap (Radix / Bucket Sort)",n:164,d:"H"},
            ]},
            { id:"sort-custom", label:"Custom Sort Problems", probs:[
              {id:"179",t:"Largest Number",n:179,d:"M"},
              {id:"1636",t:"Sort Array by Increasing Frequency",n:1636,d:"E"},
              {id:"969",t:"Pancake Sorting",n:969,d:"M"},
            ]},
          ]},
          { id:"range", label:"Range Structures", color:"#3A0D6E", sub:[
            { id:"rs-seg", label:"Segment Tree – Range Query", probs:[
              {id:"307",t:"Range Sum Query – Mutable",n:307,d:"M"},
              {id:"715",t:"Range Module",n:715,d:"H"},
            ]},
            { id:"rs-lazy", label:"Segment Tree – Lazy Propagation", probs:[
              {id:"370",t:"Range Addition",n:370,d:"M"},
              {id:"699",t:"Falling Squares",n:699,d:"H"},
            ]},
            { id:"rs-fen", label:"Fenwick Tree (BIT) – Prefix Query", probs:[
              {id:"rs307",t:"Range Sum Query – Mutable (BIT)",n:307,d:"M"},
              {id:"rs315",t:"Count of Smaller Numbers After Self",n:315,d:"H"},
              {id:"rs493",t:"Reverse Pairs",n:493,d:"H"},
            ]},
          ]},
        ];

        const DIFF = {
          E: { label:"Easy", bg:"var(--color-background-success)", color:"var(--color-text-success)" },
          M: { label:"Medium", bg:"var(--color-background-warning)", color:"var(--color-text-warning)" },
          H: { label:"Hard", bg:"var(--color-background-danger)", color:"var(--color-text-danger)" },
        };

        function toSlug(title) {
          return title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
        }

        function DSATracker() {
          const [done, setDone] = useState({});
          const [active, setActive] = useState("array");
          const [closed, setClosed] = useState({});
          const [loading, setLoading] = useState(true);
          const [search, setSearch] = useState("");

          useEffect(() => {
            try {
              const r = localStorage.getItem("dsa-tracker-v2");
              if (r) setDone(JSON.parse(r));
            } catch (e) {
              console.error("Failed to load progress", e);
            }
            setLoading(false);
          }, []);

          const toggle = useCallback(async (pid) => {
            setDone(prev => {
              const next = { ...prev, [pid]: !prev[pid] };
              localStorage.setItem("dsa-tracker-v2", JSON.stringify(next));
              return next;
            });
          }, []);

          const toggleSection = (sid) => setClosed(p => ({ ...p, [sid]: !p[sid] }));

          const totalAll = useMemo(() => CATS.reduce((a, c) => a + c.sub.reduce((b, s) => b + s.probs.length, 0), 0), []);
          const doneAll = Object.values(done).filter(Boolean).length;
          const pctAll = totalAll ? Math.round(doneAll / totalAll * 100) : 0;

          const catStats = (cat) => {
            const total = cat.sub.reduce((a, s) => a + s.probs.length, 0);
            const d = cat.sub.reduce((a, s) => a + s.probs.filter(p => done[p.id]).length, 0);
            return { total, done: d, pct: total ? Math.round(d / total * 100) : 0 };
          };

          const activeCat = CATS.find(c => c.id === active);
          const acs = catStats(activeCat);

          const searchLower = search.toLowerCase();
          const filteredSubs = activeCat.sub.map(sub => ({
            ...sub,
            probs: search ? sub.probs.filter(p => p.t.toLowerCase().includes(searchLower) || String(p.n).includes(search)) : sub.probs
          })).filter(sub => sub.probs.length > 0);

          if (loading) return (
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"var(--color-text-secondary)",fontSize:"14px"}}>
              Loading your progress...
            </div>
          );

          return (
            <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--color-background-primary)"}}>

              {/* Sidebar */}
              <div style={{
                width:"240px",flexShrink:0,
                borderRight:"0.5px solid var(--color-border-tertiary)",
                overflowY:"auto",display:"flex",flexDirection:"column",
                background: "var(--color-background-secondary)"
              }}>
                {/* Header */}
                <div style={{padding:"1.5rem 1.25rem", borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                  <div style={{fontSize:"16px",fontWeight:600,color:"var(--color-text-primary)",marginBottom:"12px"}}>DSA Mastery</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:"8px"}}>
                    <span style={{fontSize:"12px",color:"var(--color-text-secondary)"}}>Overall Progress</span>
                    <span style={{fontSize:"12px",fontWeight:600,color:"var(--color-text-primary)"}}>{doneAll}/{totalAll}</span>
                  </div>
                  <div style={{height:"6px",background:"var(--color-background-tertiary)",borderRadius:"3px",overflow:"hidden"}}>
                    <div style={{height:"100%",background:"#22c55e",borderRadius:"3px",width:`${pctAll}%`,transition:"width 0.6s cubic-bezier(0.4, 0, 0.2, 1)"}}/>
                  </div>
                  <div style={{fontSize:"11px",color:"var(--color-text-tertiary)",marginTop:"6px"}}>{pctAll}% of total completed</div>
                </div>

                {/* Category list */}
                <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
                  {CATS.map(cat => {
                    const s = catStats(cat);
                    const isActive = active === cat.id;
                    return (
                      <button key={cat.id} onClick={() => setActive(cat.id)} style={{
                        display:"block",width:"100%",textAlign:"left",
                        padding:"10px 16px",border:"none",cursor:"pointer",
                        background: isActive ? "var(--color-background-tertiary)" : "transparent",
                        borderLeft:`4px solid ${isActive ? cat.color : "transparent"}`,
                        transition:"all 0.2s",
                        outline: "none"
                      }}>
                        <div style={{fontSize:"14px",color: isActive ? "white" : "var(--color-text-secondary)",fontWeight:isActive?600:400,lineHeight:1.3}}>{cat.label}</div>
                        <div style={{display:"flex",alignItems:"center",gap:"8px",marginTop:"6px"}}>
                          <div style={{flex:1,height:"4px",background: isActive ? "rgba(255,255,255,0.05)" : "var(--color-background-tertiary)",borderRadius:"2px"}}>
                            <div style={{height:"100%",background:cat.color,borderRadius:"2px",width:`${s.pct}%`,opacity: isActive ? 1 : 0.6}}/>
                          </div>
                          <span style={{fontSize:"11px",color:"var(--color-text-tertiary)",flexShrink:0}}>{s.done}/{s.total}</span>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Main content */}
              <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column"}}>
                {/* Content header */}
                <div style={{
                  padding:"1.25rem 2rem",
                  borderBottom:"0.5px solid var(--color-border-tertiary)",
                  display:"flex",alignItems:"center",gap:"16px",
                  position:"sticky",top:0,
                  background:"rgba(10, 10, 12, 0.8)",
                  backdropFilter: "blur(12px)",
                  zIndex:10,
                }}>
                  <div style={{width:"12px",height:"12px",borderRadius:"50%",background:activeCat.color,flexShrink:0, boxShadow: `0 0 10px ${activeCat.color}44`}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:"18px",fontWeight:600,color:"var(--color-text-primary)"}}>{activeCat.label}</div>
                    <div style={{fontSize:"12px",color:"var(--color-text-secondary)"}}>{acs.done} of {acs.total} problems conquered · {acs.pct}% completion</div>
                  </div>
                  <div style={{position:"relative"}}>
                    <input
                      type="text"
                      placeholder="Filter problems..."
                      value={search}
                      onChange={e => setSearch(e.target.value)}
                      style={{
                        padding:"8px 14px",paddingLeft:"36px",fontSize:"13px",
                        border:"1px solid var(--color-border-primary)",
                        borderRadius:"var(--border-radius-md)",
                        background:"var(--color-background-secondary)",
                        color:"var(--color-text-primary)",
                        outline:"none",width:"240px",
                      }}
                    />
                    <svg style={{position:"absolute", left:"12px", top:"50%", transform:"translateY(-50%)", width:"16px", height:"16px", color:"var(--color-text-tertiary)"}} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                  </div>
                </div>

                {/* Subtopics */}
                <div style={{padding:"1.5rem 2rem",maxWidth:"1000px"}}>
                  {filteredSubs.length === 0 && (
                    <div style={{color:"var(--color-text-tertiary)",fontSize:"14px",padding:"4rem 0",textAlign:"center"}}>
                        <div style={{fontSize:"32px", marginBottom:"16px"}}>🔍</div>
                        No problems match your current filter.
                    </div>
                  )}
                  {filteredSubs.map(sub => {
                    const subDone = sub.probs.filter(p => done[p.id]).length;
                    const isOpen = !closed[sub.id];
                    return (
                      <div key={sub.id} className="fade-in" style={{
                        marginBottom:"16px",
                        background:"var(--color-background-secondary)",
                        border:"1px solid var(--color-border-tertiary)",
                        borderRadius:"var(--border-radius-lg)",
                        overflow:"hidden",
                        transition: "transform 0.2s ease"
                      }}>
                        <button
                          onClick={() => toggleSection(sub.id)}
                          style={{
                            display:"flex",alignItems:"center",width:"100%",
                            padding:"12px 20px",border:"none",cursor:"pointer",gap:"14px",
                            background:"transparent",
                            outline: "none"
                          }}
                        >
                          <span style={{
                            display:"inline-flex",alignItems:"center",justifyContent:"center",
                            width:"24px",height:"24px",borderRadius:"50%",flexShrink:0,
                            fontSize:"11px",fontWeight:600,
                            background: subDone === sub.probs.length && sub.probs.length > 0 ? "#22c55e22" : "var(--color-background-tertiary)",
                            color: subDone === sub.probs.length && sub.probs.length > 0 ? "#34d399" : "var(--color-text-secondary)",
                            border: subDone === sub.probs.length && sub.probs.length > 0 ? "1px solid #22c55e44" : "1px solid transparent",
                          }}>
                            {subDone === sub.probs.length && sub.probs.length > 0 ? "✓" : subDone}
                          </span>
                          <span style={{flex:1,fontSize:"14px",fontWeight:600,color:"var(--color-text-primary)",textAlign:"left",lineHeight:1.3}}>{sub.label}</span>
                          <span style={{fontSize:"12px",color:"var(--color-text-tertiary)",flexShrink:0, fontWeight:500}}>
                            {subDone}/{sub.probs.length}
                          </span>
                          <span style={{fontSize:"10px",color:"var(--color-text-tertiary)",flexShrink:0, transform: isOpen ? "rotate(0deg)" : "rotate(180deg)", transition: "transform 0.3s"}}>▲</span>
                        </button>

                        {isOpen && (
                          <div style={{borderTop:"1px solid var(--color-border-tertiary)"}}>
                            {sub.probs.map((prob, i) => {
                              const dc = DIFF[prob.d];
                              const isDone = !!done[prob.id];
                              return (
                                <div
                                  key={prob.id}
                                  onClick={() => toggle(prob.id)}
                                  style={{
                                    display:"flex",alignItems:"center",gap:"14px",
                                    padding:"12px 20px",cursor:"pointer",
                                    background: isDone ? "rgba(34, 197, 94, 0.03)" : "transparent",
                                    borderBottom: i < sub.probs.length-1 ? "1px solid var(--color-border-tertiary)" : "none",
                                    transition:"background 0.15s",
                                  }}
                                  onMouseEnter={(e) => e.currentTarget.style.background = isDone ? "rgba(34, 197, 94, 0.05)" : "var(--color-background-tertiary)"}
                                  onMouseLeave={(e) => e.currentTarget.style.background = isDone ? "rgba(34, 197, 94, 0.03)" : "transparent"}
                                >
                                  <div style={{
                                    width:"20px",height:"20px",borderRadius:"6px",flexShrink:0,
                                    border: isDone ? "none" : "2px solid var(--color-border-secondary)",
                                    background: isDone ? "#22c55e" : "transparent",
                                    display:"flex",alignItems:"center",justifyContent:"center",
                                    transition:"all 0.2s cubic-bezier(0.4, 0, 0.2, 1)",
                                    transform: isDone ? "scale(1.05)" : "scale(1)"
                                  }}>
                                    {isDone && <span style={{color:"white",fontSize:"12px",fontWeight:"bold"}}>✓</span>}
                                  </div>

                                  <span style={{
                                    flex:1,fontSize:"14px",
                                    color: isDone ? "var(--color-text-tertiary)" : "var(--color-text-primary)",
                                    textDecoration: isDone ? "line-through" : "none",
                                    lineHeight:1.4,
                                    fontWeight: isDone ? 400 : 500
                                  }}>{prob.t}</span>

                                  <a
                                    href={`https://leetcode.com/problems/${toSlug(prob.t)}/`}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    onClick={e => e.stopPropagation()}
                                    style={{
                                      fontSize:"12px",color:"#f89f1b",fontWeight:600,
                                      textDecoration:"none",flexShrink:0,
                                      padding:"4px 8px",borderRadius:"6px",
                                      background:"rgba(248, 159, 27, 0.1)",
                                      transition: "all 0.2s"
                                    }}
                                    onMouseEnter={e => e.currentTarget.style.background = "rgba(248, 159, 27, 0.2)"}
                                    onMouseLeave={e => e.currentTarget.style.background = "rgba(248, 159, 27, 0.1)"}
                                  >#{prob.n}</a>

                                  <span style={{
                                    fontSize:"11px",fontWeight:600,
                                    padding:"3px 10px",borderRadius:"20px",
                                    background:dc.bg,color:dc.color,
                                    flexShrink:0,minWidth:"60px",textAlign:"center",
                                    letterSpacing: "0.02em"
                                  }}>{dc.label}</span>
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DSATracker />);
    </script>
</body>
</html>
